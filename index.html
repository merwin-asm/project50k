<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Well-being Survey</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Employee Well-being & Inclusion Survey</h1>
    <form id="surveyForm">

      <!-- Identifier -->
      <label>Name:</label>
      <input type="text" name="name" required>

      <!-- Demographics -->
      <label>Age:</label>
      <input type="number" name="age" min="18" max="70">

      <label>Gender:</label>
      <select name="gender">
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
        <option>Prefer not to say</option>
      </select>

      <label>Department:</label>
      <input type="text" name="department">

      <label>Job Role:</label>
      <input type="text" name="job_role">

      <label>Years at Company:</label>
      <input type="number" name="years_at_company" min="0" max="40">

      <!-- Work & Performance -->
      <label>Work Hours per Week:</label>
      <input type="number" name="work_hours" min="0" max="100">

      <label>Performance Rating (1-5):</label>
      <input type="number" name="performance" min="1" max="5">

      <label>Job Satisfaction (1-5):</label>
      <input type="number" name="job_satisfaction" min="1" max="5">

      <label>Stress Level (1-5):</label>
      <input type="number" name="stress_level" min="1" max="5">

      <label>Work-Life Balance (1-5):</label>
      <input type="number" name="work_life_balance" min="1" max="5">

      <!-- Inclusion & Bias -->
      <label>Have you experienced bias or discrimination at work?</label>
      <select name="experienced_bias">
        <option>No</option>
        <option>Yes</option>
        <option>Prefer not to say</option>
      </select>

      <label>Do you feel included in your team? (1-5)</label>
      <input type="number" name="inclusion_score" min="1" max="5">

      <!-- Feedback -->
      <label>Feedback / Suggestions:</label>
      <textarea name="feedback" rows="4" placeholder="Your thoughts..."></textarea>

      <button type="submit">Submit</button>
    </form>

    <div id="response"></div>
  </div>

  <script>
    document.getElementById("surveyForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formData = new FormData(this);

      let data = {};
      formData.forEach((value, key) => data[key] = value);

      const res = await fetch("/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      document.getElementById("response").innerText = result.message;
    });
  </script>
</body>
</html>
